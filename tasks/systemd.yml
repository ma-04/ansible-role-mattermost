---
# The mattermost package ships its own systemd unit (inactive by default).
# We only add a drop-in to order it after the local database, then enable it.
- name: Create systemd drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/mattermost.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: mattermost_db_type == 'local'

- name: Add local database dependency drop-in
  ansible.builtin.template:
    src: mattermost-override.conf.j2
    dest: /etc/systemd/system/mattermost.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  when: mattermost_db_type == 'local'
  notify:
    - Reload systemd
    - Restart mattermost

- name: Remove database dependency drop-in when not using a local database
  ansible.builtin.file:
    path: /etc/systemd/system/mattermost.service.d/override.conf
    state: absent
  when: mattermost_db_type != 'local'
  notify: Reload systemd

- name: Flush handlers so unit changes are applied before start
  ansible.builtin.meta: flush_handlers

- name: Enable and start Mattermost
  ansible.builtin.systemd:
    name: mattermost
    state: started
    enabled: true
