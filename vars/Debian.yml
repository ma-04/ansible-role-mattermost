---
# Debian/Ubuntu package names.
mattermost_base_packages:
  - ca-certificates
  - curl
  - gnupg
# Extra packages needed to unpack the release tarball (tarball method).
mattermost_tarball_packages:
  - ca-certificates
  - tar
mattermost_postgresql_packages:
  - postgresql
  - postgresql-contrib
  - python3-psycopg2
mattermost_nginx_packages:
  - nginx
mattermost_certbot_packages:
  - certbot
mattermost_firewall_packages:
  - ufw

# PostgreSQL service name used by the restart handler / local DB tasks.
mattermost_postgresql_service: "postgresql"
