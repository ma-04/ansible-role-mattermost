---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart mattermost
  ansible.builtin.systemd:
    name: mattermost
    state: restarted

- name: Validate nginx config
  ansible.builtin.command: nginx -t
  changed_when: false
  listen: "Reload nginx"

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  listen: "Reload nginx"

- name: Restart postgresql
  ansible.builtin.systemd:
    name: "{{ mattermost_postgresql_service }}"
    state: restarted
