---
# =============================================================================
# Installation (official Mattermost APT repository, Team Edition)
# =============================================================================
# APT package version to pin, e.g. "9.11.9". Leave empty to install the latest
# version available in the repository. To upgrade later, bump this and re-run.
mattermost_version: ""
mattermost_package: "mattermost"

# Official Mattermost APT repository.
mattermost_apt_repo_url: "https://deb.packages.mattermost.com"
mattermost_apt_key_url: "https://deb.packages.mattermost.com/pubkey.gpg"
mattermost_apt_keyring: "/usr/share/keyrings/mattermost-archive-keyring.gpg"

# Paths owned by the package. Change only if you repackage Mattermost.
mattermost_install_dir: "/opt/mattermost"
mattermost_user: "mattermost"
mattermost_group: "mattermost"
mattermost_config_path: "{{ mattermost_install_dir }}/config/config.json"
mattermost_data_dir: "{{ mattermost_install_dir }}/data"
mattermost_log_dir: "{{ mattermost_install_dir }}/logs"
mattermost_plugin_dir: "{{ mattermost_install_dir }}/plugins"
mattermost_plugin_client_dir: "{{ mattermost_install_dir }}/client/plugins"

# =============================================================================
# Site / domain
# =============================================================================
# Public URL users hit, e.g. "https://chat.example.com". REQUIRED.
mattermost_site_url: ""
# Bare hostname used for the nginx vhost / TLS / Cloudflare, e.g. "chat.example.com".
mattermost_domain: "{{ mattermost_site_url | regex_replace('^https?://', '') | regex_replace('/.*$', '') }}"
# Mattermost app listen address. Bind to localhost when a proxy sits in front.
mattermost_bind_address: "127.0.0.1"
mattermost_listen_port: 8065
# Max upload size proxied by nginx.
mattermost_max_file_size: "50M"

# =============================================================================
# Database
# =============================================================================
# "local"  -> this role installs PostgreSQL and creates the db + role.
# "external" -> connect to an existing managed PostgreSQL (set host/port/ssl).
mattermost_db_type: "local"
mattermost_db_name: "mattermost"
mattermost_db_user: "mattermost"
mattermost_db_password: ""          # REQUIRED (store in Ansible Vault)
mattermost_db_host: "127.0.0.1"     # used only when db_type == external
mattermost_db_port: 5432
mattermost_db_sslmode: "require"    # external default; local is forced to "disable"

# =============================================================================
# Reverse proxy / TLS
# =============================================================================
mattermost_nginx_enabled: true
# TLS strategy: "letsencrypt", "cloudflare_origin", or "none" (plain http vhost).
mattermost_tls_mode: "letsencrypt"
# Let's Encrypt.
mattermost_letsencrypt_email: ""
mattermost_letsencrypt_webroot: "/var/www/certbot"
# Cloudflare Origin certificate contents (paste PEM here, ideally via Vault).
mattermost_ssl_dir: "/etc/ssl/mattermost"
mattermost_cloudflare_origin_cert: ""
mattermost_cloudflare_origin_key: ""

# Open 80/443 (and the app port when no proxy) with ufw.
mattermost_configure_firewall: false

# =============================================================================
# Cloudflare API integration (optional)
# =============================================================================
mattermost_cloudflare_enabled: false
mattermost_cloudflare_api_token: ""   # scoped token (Zone:DNS edit, Zone:Settings edit)
mattermost_cloudflare_zone: ""        # e.g. "example.com"
# Feature toggles.
mattermost_cloudflare_manage_dns: true
mattermost_cloudflare_record_type: "A"
mattermost_cloudflare_record_content: ""  # server public IP (or CNAME target)
mattermost_cloudflare_proxied: true
mattermost_cloudflare_manage_ssl: true
mattermost_cloudflare_ssl_mode: "full"    # off|flexible|full|strict

# =============================================================================
# Auth: GitLab OAuth (Team Edition) / generic OIDC via GitLab connector
# =============================================================================
mattermost_gitlab_auth_enabled: false
mattermost_gitlab_client_id: ""
mattermost_gitlab_client_secret: ""       # store in Ansible Vault
mattermost_gitlab_scope: ""
# Endpoints. Defaults target gitlab.com; point these at any OIDC provider that
# exposes GitLab-style OAuth endpoints (e.g. Keycloak) to do OIDC on TE.
mattermost_gitlab_auth_endpoint: "https://gitlab.com/oauth/authorize"
mattermost_gitlab_token_endpoint: "https://gitlab.com/oauth/token"
mattermost_gitlab_user_api_endpoint: "https://gitlab.com/api/v4/user"
mattermost_gitlab_button_text: ""
mattermost_gitlab_button_color: ""

# =============================================================================
# Extra config.json overrides (deep-merged last over everything above)
# =============================================================================
mattermost_config_extra: {}
