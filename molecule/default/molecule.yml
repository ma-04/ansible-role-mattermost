---
role_name_check: 1

dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: mattermost-ubuntu-2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: /usr/sbin/init
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  env:
    # Make `- role: mattermost` resolvable regardless of the checkout directory
    # name: the parent of the project dir holds the role, and the ephemeral
    # roles dir holds any galaxy-installed role dependencies.
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/..:${MOLECULE_EPHEMERAL_DIRECTORY}/roles"
  playbooks:
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible
